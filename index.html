<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>창의융합인재교육원 홍보안내</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', sans-serif; font-weight: 500; background: #fff; color: #1a2340; }
a { text-decoration: none; }
nav { background: #0f1f4a; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.nav-left { display: flex; align-items: center; gap: 12px; }
.nav-logo-img { height: 28px; background: #fff; border-radius: 4px; padding: 3px 8px; display: flex; align-items: center; font-size: 11px; font-weight: 700; color: #0f1f4a; }
.nav-title { color: #fff; font-size: 14px; font-weight: 700; }
.nav-links { display: flex; gap: 20px; }
.nav-links a { color: #cbd5e1; font-size: 13px; font-weight: 500; }
.nav-links a:hover { color: #fff; }

@keyframes float1 { 0%,100%{transform:translateY(0px) rotate(0deg);}50%{transform:translateY(-18px) rotate(8deg);} }
@keyframes float2 { 0%,100%{transform:translateY(0px) rotate(0deg);}50%{transform:translateY(-14px) rotate(-6deg);} }
@keyframes float3 { 0%,100%{transform:translateY(0px) rotate(0deg);}50%{transform:translateY(-20px) rotate(10deg);} }
@keyframes float4 { 0%,100%{transform:translateY(0px) rotate(0deg);}50%{transform:translateY(-12px) rotate(-8deg);} }
@keyframes float5 { 0%,100%{transform:translateY(0px) scale(1);}50%{transform:translateY(-16px) scale(1.06);} }
@keyframes float6 { 0%,100%{transform:translateY(0px) rotate(0deg);}50%{transform:translateY(-10px) rotate(12deg);} }
@keyframes twinkle { 0%,100%{opacity:0.6;transform:scale(1);}50%{opacity:1;transform:scale(1.25);} }
@keyframes zigzag { 0%{transform:translateY(0) translateX(0) rotate(0deg);}25%{transform:translateY(-14px) translateX(8px) rotate(6deg);}50%{transform:translateY(-20px) translateX(0) rotate(0deg);}75%{transform:translateY(-14px) translateX(-8px) rotate(-6deg);}100%{transform:translateY(0) translateX(0) rotate(0deg);} }

.hero { background: linear-gradient(160deg, #dbeafe 0%, #eef4ff 50%, #f0f5ff 100%); padding: 72px 24px 88px; position: relative; overflow: hidden; text-align: center; min-height: 600px; }
.el { position: absolute; pointer-events: none; user-select: none; }
.orb { border-radius: 50%; position: relative; overflow: hidden; }
.orb::before { content:''; position:absolute; top:12%; left:16%; width:38%; height:28%; background:rgba(255,255,255,0.75); border-radius:50%; filter:blur(3px); transform:rotate(-30deg); }
.orb::after { content:''; position:absolute; bottom:15%; right:18%; width:20%; height:14%; background:rgba(255,255,255,0.35); border-radius:50%; filter:blur(2px); }
.orb-blue { background: radial-gradient(circle at 35% 30%, #bfdbfe, #2563eb 55%, #1e3a8a 100%); }
.orb-purple { background: radial-gradient(circle at 35% 30%, #ddd6fe, #7c3aed 55%, #3b0764 100%); }
.orb-teal { background: radial-gradient(circle at 35% 30%, #a7f3d0, #059669 55%, #064e3b 100%); }
.rocket-el { font-size: 46px; filter: drop-shadow(3px 8px 12px rgba(59,130,246,0.4)); line-height:1; }
.spark { filter: drop-shadow(0 2px 5px rgba(250,200,0,0.6)); }
.deco-zigzag { position: absolute; bottom: 0; left: 0; width: 100%; height: 28px; background: #fff; clip-path: polygon(0% 100%, 2% 0%, 4% 100%, 6% 0%, 8% 100%, 10% 0%, 12% 100%, 14% 0%, 16% 100%, 18% 0%, 20% 100%, 22% 0%, 24% 100%, 26% 0%, 28% 100%, 30% 0%, 32% 100%, 34% 0%, 36% 100%, 38% 0%, 40% 100%, 42% 0%, 44% 100%, 46% 0%, 48% 100%, 50% 0%, 52% 100%, 54% 0%, 56% 100%, 58% 0%, 60% 100%, 62% 0%, 64% 100%, 66% 0%, 68% 100%, 70% 0%, 72% 100%, 74% 0%, 76% 100%, 78% 0%, 80% 100%, 82% 0%, 84% 100%, 86% 0%, 88% 100%, 90% 0%, 92% 100%, 94% 0%, 96% 100%, 98% 0%, 100% 100%); }
.hero-inner { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; }
.hero-tag { display: inline-block; background: #1a56db; color: #fff; font-size: 12px; font-weight: 700; padding: 6px 16px; border-radius: 20px; margin-bottom: 20px; letter-spacing: 0.04em; box-shadow: 0 4px 14px rgba(26,86,219,0.35); }
.hero-title { font-size: 38px; font-weight: 800; color: #0f1f4a; line-height: 1.35; margin-bottom: 14px; }
.hero-title .hl { color: #1a56db; position: relative; display: inline-block; }
.hero-title .hl::after { content:''; position:absolute; bottom:3px; left:0; width:100%; height:10px; background:#93c5fd; z-index:-1; border-radius:4px; opacity:0.45; }
.hero-sub { display: inline-block; font-size: 13px; color: #1a56db; background: #fff; border: 2px dashed #93c5fd; border-radius: 10px; padding: 5px 14px; margin-bottom: 20px; font-weight: 700; }
.hero-desc { font-size: 15px; color: #475569; line-height: 1.9; margin-bottom: 36px; }
.btn-main { padding: 15px 42px; background: #1a56db; color: #fff; border-radius: 14px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; box-shadow: 4px 4px 0px #0f3a9e, 0 8px 24px rgba(26,86,219,0.25); transition: transform 0.1s, box-shadow 0.1s; font-family: 'Pretendard', sans-serif; }
.btn-main:hover { transform: translate(2px,2px); box-shadow: 2px 2px 0px #0f3a9e; }
.badges { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 28px; }
.badge { background: #fff; border-radius: 14px; padding: 9px 16px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); border: 1.5px solid #e2e8f0; }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal-box { background: #fff; border-radius: 20px; padding: 24px; max-width: 520px; width: 90%; position: relative; }
.modal-close { position: absolute; top: 12px; right: 16px; font-size: 22px; background: none; border: none; cursor: pointer; color: #64748b; font-family: 'Pretendard', sans-serif; }
.modal-title { font-size: 16px; font-weight: 700; color: #0f1f4a; margin-bottom: 16px; }
.modal-video-area { width: 100%; height: 260px; background: linear-gradient(135deg, #1a56db18, #7c3aed18); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #64748b; border: 2px dashed #93c5fd; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
<nav>
  <div class="nav-left">
    <div class="nav-logo-img">CTCE 로고 자리</div>
    <span class="nav-title">창의융합인재교육원 홍보안내</span>
  </div>
  <div class="nav-links">
    <a href="why.html">왜 CDT인가?</a>
    <a href="games.html">미니게임</a>
    <a href="media.html">홍보자료</a>
    <a href="faq.html">FAQ</a>
  </div>
</nav>

<section class="hero">
  <!-- 왼쪽 상단 — 별 하나만 -->
  <div class="el" style="top:40px; left:5%; font-size:68px; filter:drop-shadow(3px 8px 16px rgba(180,120,0,0.4)); line-height:1; animation: float1 3.8s ease-in-out infinite;">⭐</div>
  <!-- 왼쪽 중간 — 큐브 (별과 충분히 떨어짐) -->
  <div class="el" style="top:48%; left:5%; animation: float5 4.1s ease-in-out infinite 0.3s;">
    <svg width="52" height="52" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(4px 8px 14px rgba(29,78,216,0.35));">
      <defs>
        <linearGradient id="ct" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#93c5fd"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
        <linearGradient id="cf" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
        <linearGradient id="cs" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1d4ed8"/><stop offset="100%" stop-color="#1e3a8a"/></linearGradient>
      </defs>
      <polygon points="30,4 56,18 30,32 4,18" fill="url(#ct)"/>
      <polygon points="4,18 30,32 30,56 4,42" fill="url(#cf)"/>
      <polygon points="56,18 30,32 30,56 56,42" fill="url(#cs)"/>
      <ellipse cx="26" cy="15" rx="10" ry="4" fill="rgba(255,255,255,0.5)" transform="rotate(-20 26 15)"/>
    </svg>
  </div>
  <!-- 왼쪽 하단 — 구슬(파랑) -->
  <div class="el orb orb-blue" style="width:54px;height:54px; top:74%; left:4%; animation: float2 4.2s ease-in-out infinite 0.5s;"></div>
  <!-- 오른쪽 상단 — 로켓 -->
  <div class="el rocket-el" style="top:32px; right:5%; animation: zigzag 4.5s ease-in-out infinite;">🚀</div>
  <!-- 오른쪽 중간 위 — 구슬(민트) -->
  <div class="el orb orb-teal" style="width:34px;height:34px; top:26%; right:7%; animation: float6 3.2s ease-in-out infinite 0.6s;"></div>
  <!-- 오른쪽 중간 — 퍼즐 -->
  <div class="el" style="top:48%; right:4%; animation: float3 3.6s ease-in-out infinite 0.8s;">
    <svg width="56" height="56" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(3px 8px 14px rgba(109,40,217,0.35));">
      <defs><radialGradient id="pg3" cx="35%" cy="28%" r="65%"><stop offset="0%" stop-color="#ddd6fe"/><stop offset="45%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#4c1d95"/></radialGradient></defs>
      <rect x="4" y="4" width="30" height="30" rx="8" fill="url(#pg3)"/>
      <rect x="46" y="4" width="30" height="30" rx="8" fill="url(#pg3)"/>
      <rect x="4" y="46" width="30" height="30" rx="8" fill="url(#pg3)"/>
      <rect x="46" y="46" width="30" height="30" rx="8" fill="url(#pg3)"/>
      <circle cx="40" cy="19" r="7" fill="url(#pg3)"/>
      <circle cx="19" cy="46" r="7" fill="url(#pg3)"/>
      <circle cx="61" cy="61" r="7" fill="url(#pg3)"/>
      <ellipse cx="12" cy="10" rx="7" ry="3.5" fill="rgba(255,255,255,0.5)" transform="rotate(-20 12 10)"/>
      <ellipse cx="54" cy="10" rx="7" ry="3.5" fill="rgba(255,255,255,0.5)" transform="rotate(-20 54 10)"/>
    </svg>
  </div>
  <!-- 오른쪽 하단 — 구슬(보라) -->
  <div class="el orb orb-purple" style="width:50px;height:50px; top:72%; right:5%; animation: float4 3.9s ease-in-out infinite 1.2s;"></div>
  <!-- 반짝이 3개 -->
  <div class="el spark" style="top:22%; left:20%; font-size:13px; animation: twinkle 2.1s ease-in-out infinite 0.4s;">✨</div>
  <div class="el spark" style="top:18%; right:20%; font-size:11px; animation: twinkle 2.7s ease-in-out infinite 1s;">✨</div>
  <div class="el spark" style="top:76%; left:18%; font-size:12px; animation: twinkle 2.3s ease-in-out infinite 0.7s;">💫</div>

  <div class="hero-inner">
    <div class="hero-tag">코딩창의개발능력 자격검정 (CDT)</div>
    <h1 class="hero-title">AI 시대,<br><span class="hl">코딩 사고력</span>이<br>경쟁력입니다</h1>
    <div class="hero-sub">✏️ 엔트리 · 스크래치 기반 블록코딩</div>
    <p class="hero-desc">우리 아이의 논리적 사고력을<br>자격검정으로 확인해보세요</p>
    <button class="btn-main" onclick="openModal()">🎮 미니게임 체험하기</button>
    <div class="badges">
      <div class="badge">🧠 논리적 사고력</div>
      <div class="badge">🏆 자격증 취득</div>
      <div class="badge">🤖 AI 시대 준비</div>
    </div>
  </div>
  <div class="deco-zigzag"></div>
</section>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <p class="modal-title">🎬 CDT 소개 영상</p>
    <div class="modal-video-area">
      <span style="font-size:40px;">🎬</span>
      <span>영상 파일을 여기에 넣어주세요</span>
      <span style="font-size:11px;">(추후 업로드 예정)</span>
    </div>
  </div>
</div>

<script>
function openModal() { document.getElementById('modal').classList.add('show'); }
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal') || e.target.classList.contains('modal-close')) {
    document.getElementById('modal').classList.remove('show');
  }
}
</script>
</body>
</html>
