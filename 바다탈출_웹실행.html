<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>바다탈출 - 웹 실행파일</title>
<style>
  :root {
    --bg: #0b1220;
    --panel: #111827;
    --panel2: #172033;
    --text: #eef2ff;
    --muted: #b8c2d6;
    --accent: #60a5fa;
    --danger: #fb7185;
    --ok: #34d399;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: radial-gradient(circle at top, #17324f 0, var(--bg) 45%, #050812 100%);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
  }
  body { display: flex; align-items: center; justify-content: center; padding: 18px; }
  .shell { width: min(100%, 1080px); }
  .topbar {
    display: flex; justify-content: space-between; align-items: center; gap: 14px;
    margin-bottom: 12px; flex-wrap: wrap;
  }
  .title { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  button {
    border: 0; border-radius: 999px; padding: 10px 16px; cursor: pointer;
    background: #e5e7eb; color: #111827; font-size: 15px; font-weight: 700;
    box-shadow: 0 8px 20px rgba(0,0,0,.22);
  }
  button.primary { background: var(--accent); color: white; }
  button.danger { background: var(--danger); color: white; }
  button:active { transform: translateY(1px); }
  .stage-wrap {
    position: relative; width: 100%; aspect-ratio: 16 / 9; max-height: 78vh;
    background: #020617; border-radius: 18px; padding: 10px; overflow: hidden;
    box-shadow: 0 28px 70px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.08);
  }
  canvas {
    display: block; width: 100%; height: 100%; border-radius: 12px; background: #0f172a;
    image-rendering: auto;
  }
  .hud {
    position: absolute; left: 22px; top: 22px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    pointer-events: none;
  }
  .badge {
    background: rgba(15, 23, 42, .75); color: white; padding: 7px 11px; border-radius: 999px;
    font-size: 14px; font-weight: 800; backdrop-filter: blur(4px);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
  }
  .message {
    position: absolute; left: 50%; top: 24px; transform: translateX(-50%);
    max-width: min(90%, 620px); text-align: center;
    background: rgba(255,255,255,.94); color: #0f172a;
    border-radius: 999px; padding: 10px 18px; font-weight: 900; font-size: clamp(16px, 2.2vw, 24px);
    box-shadow: 0 10px 35px rgba(0,0,0,.26); opacity: 0; transition: opacity .12s ease;
    pointer-events: none;
  }
  .message.on { opacity: 1; }
  .overlay {
    position: absolute; inset: 10px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px;
    background: linear-gradient(180deg, rgba(2,6,23,.25), rgba(2,6,23,.78));
    transition: opacity .2s ease; pointer-events: none;
  }
  .overlay.hidden { opacity: 0; }
  .overlay-card {
    pointer-events: auto; background: rgba(15,23,42,.82); border-radius: 18px; padding: 24px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.10);
    max-width: 560px;
  }
  .overlay h1 { margin: 0 0 8px; font-size: clamp(26px, 4vw, 44px); letter-spacing: -0.04em; }
  .overlay p { margin: 6px 0; color: var(--muted); line-height: 1.5; }
  .overlay .big { color: white; font-weight: 800; }
  .pad {
    position: absolute; right: 22px; bottom: 22px;
    display: grid; grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(3, 48px); gap: 6px;
    opacity: .9;
  }
  .pad button {
    padding: 0; border-radius: 12px; font-size: 22px; background: rgba(255,255,255,.88); color: #111827;
    width: 48px; height: 48px; box-shadow: 0 8px 18px rgba(0,0,0,.25);
  }
  .pad .empty { visibility: hidden; }
  .footnote { margin-top: 10px; font-size: 13px; color: var(--muted); line-height: 1.5; }
  @media (max-width: 720px) {
    body { padding: 8px; align-items: flex-start; }
    .topbar { align-items: flex-start; }
    .stage-wrap { padding: 6px; border-radius: 12px; }
    .overlay { inset: 6px; }
    .hud { left: 13px; top: 13px; }
    .badge { font-size: 12px; padding: 6px 9px; }
    .pad { right: 12px; bottom: 12px; grid-template-columns: repeat(3, 42px); grid-template-rows: repeat(3, 42px); }
    .pad button { width: 42px; height: 42px; }
  }
</style>
</head>
<body>
  <main class="shell">
    <div class="topbar">
      <div>
        <div class="title">바다탈출</div>
        <div class="subtitle">방향키로 잠수부를 움직여 불가사리를 피하고 배에 도착하세요.</div>
      </div>
      <div class="controls">
        <button class="primary" id="startBtn">▶ 시작</button>
        <button id="restartBtn">↻ 다시 시작</button>
        <button class="danger" id="stopBtn">■ 정지</button>
      </div>
    </div>

    <section class="stage-wrap" aria-label="바다탈출 게임 화면">
      <canvas id="game" width="960" height="540" tabindex="0"></canvas>
      <div class="hud">
        <span class="badge" id="timeBadge">초시계 0초</span>
        <span class="badge" id="stateBadge">대기</span>
      </div>
      <div class="message" id="message"></div>
      <div class="overlay" id="overlay">
        <div class="overlay-card">
          <h1>바다탈출</h1>
          <p class="big">불가사리를 피해 배를 타세요.</p>
          <p>조작: 키보드 방향키 또는 오른쪽 아래 방향 버튼</p>
          <p>원본 엔트리 답안파일의 주요 동작을 웹 실행형으로 재현했습니다.</p>
          <button class="primary" id="overlayStart">게임 시작</button>
        </div>
      </div>
      <div class="pad" aria-label="터치 방향 버튼">
        <span class="empty"></span><button data-dir="up">▲</button><span class="empty"></span>
        <button data-dir="left">◀</button><span class="empty"></span><button data-dir="right">▶</button>
        <span class="empty"></span><button data-dir="down">▼</button><span class="empty"></span>
      </div>
    </section>
    <div class="footnote">홈페이지에는 이 HTML 파일 하나만 업로드해도 실행됩니다. 엔트리 편집용 원본은 별도로 `.ent` 파일을 배포하세요.</div>
  </main>

  const LOGICAL_W = 480;
  const LOGICAL_H = 270;
  const PIXEL_SCALE = 2;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const timeBadge = document.getElementById('timeBadge');
  const stateBadge = document.getElementById('stateBadge');
  const messageEl = document.getElementById('message');
  const overlay = document.getElementById('overlay');

  const keys = new Set();
  const pressedDirections = new Set();
  const images = {};
  let lastFrame = performance.now();
  let rafId = null;

  const game = {
    mode: 'loading',
    startedAt: 0,
    timerStartedAt: null,
    now: 0,
    message: '',
    messageUntil: 0,
    boat: { x: 130, y: 110, visible: false, scale: 0.6 },
    diver: { x: -180, y: 70, startX: -180, startY: 70, targetX: 200, targetY: -100, visible: true, scale: 0.4, direction: 90, frame: 0, flip: false, movable: false },
    stars: [],
    spawned: 0,
    nextSpawnAt: 4,
    timerDialogIndex: 0,
    endReason: ''
  };

  function loadImages() {
    const entries = Object.entries(ASSET_URIS);
    return Promise.all(entries.map(([key, uri]) => new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => { images[key] = img; resolve(); };
      img.onerror = reject;
      img.src = uri;
    })));
  }

  function logicalToCanvasX(x) { return (LOGICAL_W / 2 + x) * PIXEL_SCALE; }
  function logicalToCanvasY(y) { return (LOGICAL_H / 2 - y) * PIXEL_SCALE; }

  function setMessage(text, duration = 1.2) {
    game.message = text;
    game.messageUntil = game.now + duration;
  }

  function showOverlay(show) {
    overlay.classList.toggle('hidden', !show);
  }

  function updateBadges() {
    const timer = game.timerStartedAt === null ? 0 : Math.max(0, game.now - game.timerStartedAt);
    timeBadge.textContent = `초시계 ${Math.floor(timer)}초`;
    let label = '대기';
    if (game.mode === 'playing') label = game.diver.movable ? '이동 중' : '준비 중';
    if (game.mode === 'success') label = '성공';
    if (game.mode === 'fail') label = game.endReason || '실패';
    if (game.mode === 'stopped') label = '정지';
    stateBadge.textContent = label;
  }

  function random(min, max) { return min + Math.random() * (max - min); }

  function resetGame(autoStart = false) {
    game.mode = autoStart ? 'playing' : 'ready';
    game.startedAt = performance.now() / 1000;
    game.now = 0;
    game.timerStartedAt = null;
    game.message = '';
    game.messageUntil = 0;
    game.boat = { x: 130, y: 110, visible: false, scale: 0.6 };
    game.diver = {
      x: -180, y: 70, startX: -180, startY: 70, targetX: 200, targetY: -100,
      visible: true, scale: 0.4, direction: 90, frame: 0, flip: false, movable: false
    };
    game.stars = [];
    game.spawned = 0;
    game.nextSpawnAt = 4;
    game.timerDialogIndex = 0;
    game.endReason = '';
    showOverlay(!autoStart);
    updateBadges();
    if (autoStart) {
      setMessage('으악', 1);
      canvas.focus({ preventScroll: true });
    }
  }

  function startGame() {
    resetGame(true);
  }

  function stopGame() {
    if (game.mode === 'playing') {
      game.mode = 'stopped';
      game.endReason = '정지';
      showOverlay(true);
      overlay.querySelector('h1').textContent = '정지';
      overlay.querySelector('.big').textContent = '게임이 정지되었습니다.';
    }
  }

  function endGame(mode, reason) {
    if (game.mode !== 'playing') return;
    game.mode = mode;
    game.endReason = reason || '';
    game.diver.movable = false;
    if (mode === 'success') {
      setMessage('성공!', 3);
      game.diver.x = game.boat.x;
      game.diver.y = game.boat.y - 30;
    } else {
      setMessage(reason === '타임 오버' ? '타임 오버!' : '실패!', 3);
    }
    setTimeout(() => {
      showOverlay(true);
      overlay.querySelector('h1').textContent = mode === 'success' ? '탈출 성공!' : (reason === '타임 오버' ? '타임 오버!' : '탈출 실패');
      overlay.querySelector('.big').textContent = mode === 'success' ? '잠수부가 배에 도착했습니다.' : '다시 도전해 보세요.';
    }, 500);
  }

  function activeDirectionFromInput() {
    if (keys.has('ArrowLeft') || pressedDirections.has('left')) return -90;
    if (keys.has('ArrowRight') || pressedDirections.has('right')) return 90;
    if (keys.has('ArrowUp') || pressedDirections.has('up')) return 0;
    if (keys.has('ArrowDown') || pressedDirections.has('down')) return 180;
    return null;
  }

  function moveDiver(dt) {
    const dir = activeDirectionFromInput();
    if (dir !== null) game.diver.direction = dir;

    const speed = 120;
    let vx = 0, vy = 0;
    if (game.diver.direction === 90) vx = 1;
    if (game.diver.direction === -90) vx = -1;
    if (game.diver.direction === 0) vy = 1;
    if (game.diver.direction === 180) vy = -1;

    game.diver.x += vx * speed * dt;
    game.diver.y += vy * speed * dt;

    const minX = -220, maxX = 220, minY = -112, maxY = 112;
    if (game.diver.x < minX) { game.diver.x = minX; game.diver.direction = 90; }
    if (game.diver.x > maxX) { game.diver.x = maxX; game.diver.direction = -90; }
    if (game.diver.y < minY) { game.diver.y = minY; game.diver.direction = 0; }
    if (game.diver.y > maxY) { game.diver.y = maxY; game.diver.direction = 180; }

    if (vx || vy) game.diver.frame = (game.diver.frame + dt * 8) % 5;
  }

  function spawnStar() {
    const scale = random(0.10, 0.15);
    game.stars.push({
      x: random(-220, 220),
      y: random(-110, 110),
      scale,
      seed: Math.random() * 10,
      frame: Math.floor(Math.random() * 4)
    });
  }

  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return Math.abs(ax - bx) * 2 < aw + bw && Math.abs(ay - by) * 2 < ah + bh;
  }

  function checkCollisions() {
    if (game.mode !== 'playing') return;
    const d = game.diver;
    if (game.boat.visible) {
      const boatW = 243 * game.boat.scale;
      const boatH = 124 * game.boat.scale;
      const diverW = 153 * d.scale * 0.58;
      const diverH = 327 * d.scale * 0.70;
      if (rectsOverlap(d.x, d.y, diverW, diverH, game.boat.x, game.boat.y, boatW, boatH)) {
        endGame('success');
        return;
      }
    }
    for (const s of game.stars) {
      const visible = ((game.now + s.seed) % 0.4) < 0.2;
      if (!visible) continue;
      const dx = d.x - s.x;
      const dy = d.y - s.y;
      const starRadius = 95 * s.scale;
      const diverRadius = 24;
      if (Math.hypot(dx, dy) < starRadius + diverRadius) {
        endGame('fail', '실패');
        return;
      }
    }
  }

  function update(dt) {
    if (game.mode !== 'playing') return;
    game.now = performance.now() / 1000 - game.startedAt;

    if (game.now <= 1) {
      const p = game.now / 1;
      game.diver.x = game.diver.startX + (game.diver.targetX - game.diver.startX) * p;
      game.diver.y = game.diver.startY + (game.diver.targetY - game.diver.startY) * p;
      game.diver.flip = Math.floor(game.now / 0.1) % 2 === 1;
      if (Math.floor(game.now / 0.2) % 2 === 0) setMessage('으악', 0.25);
    } else if (game.now < 3) {
      if (game.messageUntil < game.now + 0.05) setMessage('불가사리를 피해 배를 타야해!', 2);
      game.diver.flip = false;
    } else {
      game.diver.movable = true;
    }

    if (game.now >= 4 && !game.boat.visible) {
      game.boat.x = random(-200, 200);
      game.boat.y = 110;
      game.boat.visible = true;
      game.timerStartedAt = game.now;
      setMessage('배가 나타났습니다!', 1.1);
    }

    if (game.now >= game.nextSpawnAt && game.spawned < 15) {
      spawnStar();
      game.spawned += 1;
      game.nextSpawnAt += 0.1;
    }

    if (game.diver.movable) moveDiver(dt);

    if (game.timerStartedAt !== null) {
      const elapsed = game.now - game.timerStartedAt;
      const nextDialogTime = (game.timerDialogIndex + 1) * 8;
      if (game.timerDialogIndex < 6 && elapsed >= nextDialogTime && elapsed < nextDialogTime + dt + 0.05) {
        game.timerDialogIndex += 1;
        setMessage(String(Math.round(elapsed)), 2);
      }
      if (elapsed > 60) {
        endGame('fail', '타임 오버');
      }
    }

    checkCollisions();
    updateBadges();
  }

  function drawCentered(img, x, y, logicalW, logicalH, opts = {}) {
    const px = logicalToCanvasX(x);
    const py = logicalToCanvasY(y);
    const w = logicalW * PIXEL_SCALE;
    const h = logicalH * PIXEL_SCALE;
    ctx.save();
    ctx.translate(px, py);
    if (opts.flipX) ctx.scale(-1, 1);
    if (opts.rotate) ctx.rotate(opts.rotate);
    if (opts.alpha !== undefined) ctx.globalAlpha = opts.alpha;
    ctx.drawImage(img, -w / 2, -h / 2, w, h);
    ctx.restore();
  }

  function drawBubble(text, x, y) {
    const px = logicalToCanvasX(x);
    const py = logicalToCanvasY(y) - 70;
    ctx.save();
    ctx.font = 'bold 28px "Noto Sans KR", system-ui, sans-serif';
    const paddingX = 20;
    const metrics = ctx.measureText(text);
    const bw = Math.max(88, metrics.width + paddingX * 2);
    const bh = 48;
    const bx = Math.min(Math.max(16, px - bw / 2), canvas.width - bw - 16);
    const by = Math.max(20, py - bh / 2);
    ctx.fillStyle = 'rgba(255,255,255,.96)';
    ctx.strokeStyle = 'rgba(15,23,42,.22)';
    ctx.lineWidth = 2;
    roundRect(ctx, bx, by, bw, bh, 24);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#0f172a';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, bx + paddingX, by + bh / 2 + 1);
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (game.mode === 'success') {
      ctx.drawImage(images.successBg, 0, 0, canvas.width, canvas.height);
    } else if (game.mode === 'fail') {
      ctx.drawImage(images.failBg, 0, 0, canvas.width, canvas.height);
    } else {
      ctx.drawImage(images.background, 0, 0, canvas.width, canvas.height);
    }

    if (game.boat.visible) {
      drawCentered(images.boat, game.boat.x, game.boat.y, 243 * game.boat.scale, 124 * game.boat.scale);
    }

    for (const s of game.stars) {
      const visible = ((game.now + s.seed) % 0.4) < 0.2 || game.mode !== 'playing';
      if (!visible) continue;
      const starImgs = [images.star1, images.star2, images.star3, images.star4];
      const img = starImgs[(s.frame + Math.floor(game.now * 8)) % starImgs.length];
      drawCentered(img, s.x, s.y, 200 * s.scale, 200 * s.scale, { rotate: (game.now + s.seed) * 0.7 });
    }

    if (game.diver.visible) {
      const diverImgs = [images.diver1, images.diver2, images.diver3, images.diver4, images.diver5];
      let img = diverImgs[Math.floor(game.diver.frame) % diverImgs.length];
      if (game.now <= 1) img = images.diver1;
      const iw = img.naturalWidth || img.width;
      const ih = img.naturalHeight || img.height;
      const facingLeft = game.diver.direction === -90;
      drawCentered(img, game.diver.x, game.diver.y, iw * game.diver.scale, ih * game.diver.scale, { flipX: facingLeft || game.diver.flip });
    }

    if (game.message && game.messageUntil > game.now && ['으악', '성공!', '실패!', '타임 오버!'].includes(game.message)) {
      const x = game.message === '성공!' ? game.boat.x : game.diver.x;
      const y = game.message === '성공!' ? game.boat.y : game.diver.y;
      drawBubble(game.message, x, y);
    }

    const showMsg = game.message && game.messageUntil > game.now;
    if (showMsg) {
      messageEl.textContent = game.message;
      messageEl.classList.add('on');
    } else {
      messageEl.classList.remove('on');
    }
  }

  function loop(nowMs) {
    const dt = Math.min(0.05, (nowMs - lastFrame) / 1000 || 0);
    lastFrame = nowMs;
    update(dt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function bindEvents() {
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);
    document.getElementById('overlayStart').addEventListener('click', startGame);
    document.getElementById('stopBtn').addEventListener('click', stopGame);

    window.addEventListener('keydown', (e) => {
      if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
      if (e.key === ' ' && game.mode !== 'playing') startGame();
      keys.add(e.key);
    }, { passive: false });
    window.addEventListener('keyup', (e) => keys.delete(e.key));

    document.querySelectorAll('.pad button[data-dir]').forEach(btn => {
      const dir = btn.dataset.dir;
      const down = (e) => { e.preventDefault(); pressedDirections.add(dir); canvas.focus({ preventScroll: true }); };
      const up = (e) => { e.preventDefault(); pressedDirections.delete(dir); };
      btn.addEventListener('pointerdown', down);
      btn.addEventListener('pointerup', up);
      btn.addEventListener('pointercancel', up);
      btn.addEventListener('pointerleave', up);
    });
  }

  loadImages().then(() => {
    game.mode = 'ready';
    bindEvents();
    resetGame(false);
    overlay.querySelector('h1').textContent = '바다탈출';
    overlay.querySelector('.big').textContent = '불가사리를 피해 배를 타세요.';
    lastFrame = performance.now();
    rafId = requestAnimationFrame(loop);
  }).catch((err) => {
    console.error(err);
    stateBadge.textContent = '로딩 오류';
    messageEl.textContent = '이미지 로딩 중 오류가 발생했습니다.';
    messageEl.classList.add('on');
  });
})();
</script>
</body>
</html>
